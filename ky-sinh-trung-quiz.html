<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trắc Nghiệm Ký Sinh Trùng</title>
<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --surface2: #273449;
    --border: #334155;
    --accent: #38bdf8;
    --accent2: #0ea5e9;
    --correct: #22c55e;
    --wrong: #ef4444;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --pill: #0f172a;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #0c4a6e 0%, #0f172a 60%);
    border-bottom: 1px solid var(--border);
    padding: 1.2rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    width: 40px; height: 40px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem;
    flex-shrink: 0;
  }
  .header-title { font-size: 1.1rem; font-weight: 700; color: var(--text); }
  .header-sub { font-size: 0.75rem; color: var(--muted); }
  .header-stats {
    margin-left: auto;
    display: flex; gap: 1rem; align-items: center;
  }
  .stat-badge {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.3rem 0.7rem;
    font-size: 0.78rem;
    color: var(--muted);
  }
  .stat-badge span { color: var(--accent); font-weight: 700; }

  /* LAYOUT */
  .app { max-width: 860px; margin: 0 auto; padding: 1.5rem; }

  /* FILTER BAR */
  .filter-bar {
    display: flex; gap: 0.5rem; flex-wrap: wrap;
    margin-bottom: 1.5rem;
    align-items: center;
  }
  .filter-label { color: var(--muted); font-size: 0.8rem; margin-right: 0.2rem; }
  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 0.35rem 0.8rem;
    border-radius: 20px;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #0c1222; font-weight: 600; }
  .search-box {
    margin-left: auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.35rem 0.8rem;
    color: var(--text);
    font-size: 0.82rem;
    width: 200px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--muted); }

  /* MODE BAR */
  .mode-bar {
    display: flex; gap: 0.6rem;
    margin-bottom: 1.5rem;
  }
  .mode-btn {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 0.6rem;
    border-radius: 10px;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }
  .mode-btn:hover { border-color: var(--accent); color: var(--text); }
  .mode-btn.active { background: var(--accent); border-color: var(--accent); color: #0c1222; font-weight: 700; }

  /* QUIZ MODE - SINGLE CARD */
  #quiz-mode { display: none; }
  .quiz-progress {
    display: flex; align-items: center; gap: 1rem;
    margin-bottom: 1rem;
  }
  .progress-bar {
    flex: 1; height: 6px;
    background: var(--surface);
    border-radius: 3px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: var(--accent);
    border-radius: 3px;
    transition: width 0.3s ease;
  }
  .progress-text { color: var(--muted); font-size: 0.78rem; white-space: nowrap; }

  /* CARD */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.5rem;
    margin-bottom: 1rem;
    transition: border-color 0.2s;
  }
  .card:hover { border-color: #475569; }
  .card-meta {
    display: flex; align-items: center; gap: 0.6rem;
    margin-bottom: 0.8rem;
  }
  .q-num {
    background: var(--accent);
    color: #0c1222;
    font-weight: 700;
    font-size: 0.72rem;
    padding: 0.2rem 0.6rem;
    border-radius: 6px;
  }
  .q-topic {
    background: var(--surface2);
    color: var(--muted);
    font-size: 0.72rem;
    padding: 0.2rem 0.6rem;
    border-radius: 6px;
    border: 1px solid var(--border);
  }
  .q-text {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 1rem;
    line-height: 1.5;
  }
  .options { display: flex; flex-direction: column; gap: 0.5rem; }
  .option {
    display: flex; align-items: flex-start; gap: 0.7rem;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 0.7rem 0.9rem;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 0.87rem;
    color: var(--text);
    text-align: left;
  }
  .option:hover:not(.selected):not(.revealed) {
    border-color: var(--accent);
    background: rgba(56,189,248,0.07);
  }
  .option-letter {
    font-weight: 700;
    color: var(--accent);
    flex-shrink: 0;
    width: 20px;
  }
  .option.correct {
    border-color: var(--correct);
    background: rgba(34,197,94,0.12);
  }
  .option.correct .option-letter { color: var(--correct); }
  .option.wrong {
    border-color: var(--wrong);
    background: rgba(239,68,68,0.10);
  }
  .option.wrong .option-letter { color: var(--wrong); }
  .option.selected:not(.correct):not(.wrong) {
    border-color: var(--accent);
    background: rgba(56,189,248,0.12);
  }

  /* Feedback */
  .feedback {
    margin-top: 0.8rem;
    padding: 0.7rem 1rem;
    border-radius: 8px;
    font-size: 0.84rem;
    display: none;
  }
  .feedback.correct-fb { background: rgba(34,197,94,0.12); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
  .feedback.wrong-fb { background: rgba(239,68,68,0.10); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }

  /* NAV BUTTONS */
  .quiz-nav {
    display: flex; gap: 0.7rem; margin-top: 1.2rem;
  }
  .btn {
    padding: 0.6rem 1.2rem;
    border-radius: 8px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
  }
  .btn-primary { background: var(--accent); color: #0c1222; }
  .btn-primary:hover { background: #7dd3fc; }
  .btn-secondary { background: var(--surface); border: 1px solid var(--border); color: var(--text); }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--text); }
  .ml-auto { margin-left: auto; }

  /* BROWSE MODE */
  #browse-mode { }
  .question-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.2rem;
    margin-bottom: 0.8rem;
    transition: border-color 0.15s;
  }
  .question-item:hover { border-color: #475569; }
  .qi-header { display: flex; gap: 0.6rem; margin-bottom: 0.6rem; align-items: center; }
  .qi-text { font-size: 0.9rem; font-weight: 600; margin-bottom: 0.7rem; }
  .qi-options { display: flex; flex-direction: column; gap: 0.3rem; }
  .qi-option {
    display: flex; gap: 0.6rem;
    padding: 0.4rem 0.7rem;
    border-radius: 7px;
    font-size: 0.83rem;
    color: var(--muted);
    border: 1px solid transparent;
  }
  .qi-option.is-answer {
    background: rgba(34,197,94,0.12);
    border-color: rgba(34,197,94,0.3);
    color: #4ade80;
    font-weight: 600;
  }
  .qi-option.is-answer .qi-letter { color: #4ade80; }
  .qi-letter { font-weight: 700; flex-shrink: 0; width: 18px; color: var(--accent); }
  .toggle-answer {
    background: none; border: none;
    color: var(--accent); font-size: 0.75rem;
    cursor: pointer; padding: 0.2rem 0;
    margin-top: 0.3rem;
    display: inline-block;
  }
  .toggle-answer:hover { text-decoration: underline; }

  /* RESULTS */
  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    text-align: center;
    margin-bottom: 1rem;
  }
  .result-score {
    font-size: 3.5rem;
    font-weight: 900;
    color: var(--accent);
    line-height: 1;
  }
  .result-label { color: var(--muted); margin-top: 0.3rem; margin-bottom: 1.5rem; }
  .result-bars { display: flex; gap: 0.5rem; margin-top: 1rem; justify-content: center; }
  .r-bar { flex: 1; max-width: 80px; }
  .r-bar-fill { border-radius: 6px; margin-bottom: 0.3rem; min-height: 4px; }
  .r-bar-label { font-size: 0.7rem; color: var(--muted); }

  /* Pagination */
  .pagination {
    display: flex; gap: 0.4rem; justify-content: center;
    margin-top: 1.5rem; flex-wrap: wrap;
  }
  .page-btn {
    width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 7px;
    font-size: 0.8rem;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    transition: all 0.15s;
  }
  .page-btn:hover, .page-btn.active {
    border-color: var(--accent); color: var(--accent);
  }
  .page-btn.active { background: var(--accent); color: #0c1222; font-weight: 700; }

  /* Empty */
  .empty { text-align: center; padding: 3rem; color: var(--muted); }
  .empty-icon { font-size: 2.5rem; margin-bottom: 0.7rem; }

  @media (max-width: 600px) {
    .header-stats { display: none; }
    .filter-bar { flex-direction: column; align-items: stretch; }
    .search-box { width: 100%; margin-left: 0; }
    .mode-bar { flex-direction: column; }
    .quiz-nav { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">🔬</div>
  <div>
    <div class="header-title">Trắc Nghiệm Ký Sinh Trùng</div>
    <div class="header-sub">Ôn tập giun sán, đơn bào, sốt rét</div>
  </div>
  <div class="header-stats">
    <div class="stat-badge">Tổng: <span id="total-count">0</span> câu</div>
    <div class="stat-badge" id="score-badge" style="display:none">Điểm: <span id="score-text">0/0</span></div>
  </div>
</header>

<div class="app">

  <!-- MODE SELECTOR -->
  <div class="mode-bar">
    <button class="mode-btn active" id="btn-browse" onclick="setMode('browse')">📚 Xem Tất Cả</button>
    <button class="mode-btn" id="btn-quiz" onclick="setMode('quiz')">✏️ Thi Trắc Nghiệm</button>
    <button class="mode-btn" id="btn-result" onclick="setMode('result')" style="display:none">📊 Kết Quả</button>
  </div>

  <!-- FILTER BAR (Browse mode) -->
  <div class="filter-bar" id="filter-bar">
    <span class="filter-label">Chủ đề:</span>
    <button class="filter-btn active" onclick="setTopic('all')">Tất cả</button>
    <button class="filter-btn" onclick="setTopic('giun')">Giun tròn</button>
    <button class="filter-btn" onclick="setTopic('san')">Sán / KST khác</button>
    <button class="filter-btn" onclick="setTopic('don-bao')">Đơn bào</button>
    <button class="filter-btn" onclick="setTopic('sot-ret')">Sốt rét</button>
    <input class="search-box" type="text" placeholder="🔍 Tìm câu hỏi..." id="search-input" oninput="doSearch()">
  </div>

  <!-- BROWSE MODE -->
  <div id="browse-mode">
    <div id="question-list"></div>
    <div class="pagination" id="pagination"></div>
  </div>

  <!-- QUIZ MODE -->
  <div id="quiz-mode">
    <div class="quiz-progress">
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <div class="progress-text" id="progress-text">0 / 0</div>
    </div>
    <div class="card" id="quiz-card">
      <div class="card-meta">
        <span class="q-num" id="qz-num">Câu 1</span>
        <span class="q-topic" id="qz-topic"></span>
      </div>
      <div class="q-text" id="qz-text"></div>
      <div class="options" id="qz-options"></div>
      <div class="feedback" id="qz-feedback"></div>
    </div>
    <div class="quiz-nav">
      <button class="btn btn-secondary" onclick="quizPrev()">← Trước</button>
      <button class="btn btn-ghost" onclick="quizSkip()">Bỏ qua</button>
      <button class="btn btn-primary ml-auto" id="btn-next" onclick="quizNext()">Tiếp →</button>
    </div>
  </div>

  <!-- RESULT MODE -->
  <div id="result-mode" style="display:none">
    <div class="result-card">
      <div class="result-score" id="final-score">—</div>
      <div class="result-label">điểm chính xác</div>
      <div id="result-detail"></div>
    </div>
    <button class="btn btn-primary" onclick="restartQuiz()" style="margin-bottom:1rem">🔄 Thi lại</button>
    <button class="btn btn-secondary" onclick="setMode('browse')" style="margin-bottom:1rem; margin-left:0.5rem">📚 Xem bài</button>
    <div id="review-list"></div>
  </div>

</div>

<script>
// =====================================================
// DATA: Full question bank extracted from PDF
// =====================================================
const questions = [
  // ── GIUN ĐŨA (Ascaris lumbricoides) ──
  {id:1001,num:"Câu 01",topic:"giun",text:"Điều kiện thuận lợi để ấu trùng Ancylostoma duodenale (giun móc) tồn tại và phát triển ở điều kiện nào?",opts:["Nhiệt độ thấp","Vùng khô ráo","Nhiệt độ nhất định, 25°C–30°C","Đất sét"],ans:2},
  {id:1002,num:"Câu 02",topic:"giun",text:"Yếu tố dịch tễ thuận lợi cho sự lây nhiễm Ancylostoma duodenale (giun móc) là gì?",opts:["Đất bụi","Không có công trình vệ sinh tốt","Vùng đất sét cứng","Thiếu nguồn dinh dưỡng"],ans:1},
  {id:1003,num:"Câu 03",topic:"giun",text:"Ở Việt Nam vùng nào có tỉ lệ nhiễm Ancylostoma duodenale (giun móc) cao?",opts:["Thưa dân","Cư dân trồng lúa","Cư thành phố, đô thị","Vùng biển"],ans:1},
  {id:1004,num:"Câu 04",topic:"giun",text:"Tác hại nào của Bệnh Ancylostoma duodenale (giun móc) gây tác hại nghiêm trọng và kéo dài?",opts:["Viêm da","Thiếu máu mạn tính","Viêm trang đại tràng","Đau bụng mạn tính"],ans:1},
  {id:1005,num:"Câu 05",topic:"giun",text:"Sức tấm trung của Bệnh Ancylostoma duodenale (giun móc) nặng có khả năng gây tổn thương gì?",opts:["Bệnh là thức thì, không có khả năng hồi phục","Bệnh là thức, có khả năng hồi phục","Bệnh là thức thì, không có khả năng hồi phục","Bệnh là thức, có khả năng hồi phục"],ans:0},
  {id:1006,num:"Câu 06",topic:"giun",text:"Thiếu máu ở Bệnh Ancylostoma duodenale (giun móc) chủ yếu do nguyên nhân nào?",opts:["Bệnh là thức thì bổ phục","Bệnh là thức thì bổ phục","Bệnh là thức thì, không có khả năng hồi phục","Giun móc hút máu"],ans:3},
  {id:1007,num:"Câu 07",topic:"giun",text:"Đặc điểm nào đây, không phải hành của trứng Trichuris trichura (giun tóc)?",opts:["Hình bầu dục","Có 2 nút ở 2 đầu","Do ức chế lăy xương","Kích thước nhỏ"],ans:2},
  {id:1008,num:"Câu 08",topic:"giun",text:"Người bị nhiễm Trichuris trichura (giun tóc) có thể ăn đi phải gì?",opts:["Ăn rau chua sống; Người bị nhiễm có thể ăn đi phải gì?","Ăn thịt lợn chưa chin","An hoa quả chưa rửa sạch","Uống nước lã"],ans:2},

  // ── GIUN KIM (Enterobius vermicularis) ──
  {id:1101,num:"Câu 1267",topic:"giun",text:"Trong giun kim, các bệnh điều trị nên chú ý điều gì sau đây?",opts:["Chống tái nhiễm","Bổ sung vitamin","Nâng cao thể trạng","Điều trị định kỳ"],ans:0},
  {id:1102,num:"Câu 1268",topic:"giun",text:"Hiện tượng từ tổng sinh đầu con nào thường gặp ở bệnh do Enterobius vermicularis (giun kim)?",opts:["Nóng sốt","Enterobius vermicularis (giun kim)","Necator americanus","Ascaris lumbricoides (giun đũa)"],ans:1},
  {id:1103,num:"Câu 1269",topic:"giun",text:"Enterobius vermicularis (giun kim) có tỷ lệ nhiễm cao ở đối tượng nào?",opts:["Người già","Trẻ em","Phụ nữ","Người lao động"],ans:1},
  {id:1104,num:"Câu 1270",topic:"giun",text:"Thức ăn của Enterobius vermicularis (giun kim) trong cơ thể người là gì?",opts:["Máu","Phân","Dưỡng chất ở ruột","Biểu mô ruột"],ans:2},
  {id:1105,num:"Câu 1271",topic:"giun",text:"Triệu chứng của bệnh do giun kim Enterobius vermicularis (giun kim) là gì?",opts:["Ngứa hậu môn ban đêm","Đau bụng","Buồn nôn","Tiêu chảy"],ans:0},
  {id:1106,num:"Câu 1272",topic:"giun",text:"Phương thức lây nhiễm chủ yếu của Enterobius vermicularis (giun kim) là gì?",opts:["Ăn thức ăn chứa trứng","Qua da","Trung gian động vật","Tiếp xúc với đất"],ans:0},
  {id:1107,num:"Câu 1273",topic:"giun",text:"Trong các yếu tố dưới đây, yếu tố nào KHÔNG thuộc chu kỳ sinh trưởng của giun kim?",opts:["Trứng → ấu trùng cảm nhiễm → ấu trùng mô","Ấu trùng nở tại ruột","Con cái đẻ trứng ở hậu môn","Vật chủ trung gian bắt buộc"],ans:3},
  {id:1108,num:"Câu 1275",topic:"giun",text:"Hai kỹ thuật thường dùng để xét nghiệm chẩn đoán bệnh giun kim là gì?",opts:["Kato–Katz","Xét nghiệm phân và kỹ thuật băng dính","Soi máu","Cấy phân"],ans:1},
  {id:1109,num:"Câu 1276",topic:"giun",text:"Giun kim có thể phát triển, ấu trùng của loại giun nào gây hội chứng Loeffler?",opts:["Ancylostoma duodenale (giun móc)","Trichuris trichura (giun tóc)","Ascaris lumbricoides (giun đũa)","Enterobius vermicularis (giun kim)"],ans:2},

// =====================================================
// APP STATE
// =====================================================
let currentTopic = 'all';
let currentSearch = '';
let currentPage = 1;
const PAGE_SIZE = 15;
let currentMode = 'browse';

// Quiz state
let quizQuestions = [];
let quizIndex = 0;
let quizAnswers = {};
let quizRevealed = {};

// =====================================================
// FILTER & SEARCH
// =====================================================
function getFiltered() {
  return questions.filter(q => {
    const topicOk = currentTopic === 'all' || q.topic === currentTopic;
    const s = currentSearch.toLowerCase();
    const searchOk = !s || q.text.toLowerCase().includes(s) ||
      q.opts.some(o => o.toLowerCase().includes(s)) ||
      q.num.toLowerCase().includes(s);
    return topicOk && searchOk;
  });
}

function setTopic(t) {
  currentTopic = t;
  currentPage = 1;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderBrowse();
}

function doSearch() {
  currentSearch = document.getElementById('search-input').value;
  currentPage = 1;
  renderBrowse();
}

// =====================================================
// BROWSE MODE
// =====================================================
function renderBrowse() {
  const filtered = getFiltered();
  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filtered.slice(start, start + PAGE_SIZE);

  document.getElementById('total-count').textContent = filtered.length;

  const list = document.getElementById('question-list');
  if (page.length === 0) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div>Không tìm thấy câu hỏi nào.</div>`;
  } else {
    list.innerHTML = page.map(q => renderQuestionItem(q)).join('');
  }

  // Pagination
  const pg = document.getElementById('pagination');
  if (totalPages <= 1) { pg.innerHTML = ''; return; }
  let html = '';
  for (let i = 1; i <= totalPages; i++) {
    html += `<button class="page-btn${i===currentPage?' active':''}" onclick="goPage(${i})">${i}</button>`;
  }
  pg.innerHTML = html;
}

function renderQuestionItem(q) {
  const topicLabel = {giun:'Giun tròn',san:'Sán / KST',don_bao:'Đơn bào','don-bao':'Đơn bào','sot-ret':'Sốt rét'}[q.topic]||q.topic;
  const opts = q.opts.map((o,i) => {
    const letter = ['A','B','C','D'][i];
    const isAns = i === q.ans;
    return `<div class="qi-option${isAns?' is-answer':''}" data-id="opt-${q.id}-${i}" style="${isAns?'':'display:none'} ">
      <span class="qi-letter">${letter}.</span><span>${o}</span>
    </div>
    <div class="qi-option" data-id="optbr-${q.id}-${i}" style="display:${isAns?'none':'flex'}">
      <span class="qi-letter">${letter}.</span><span>${o}</span>
    </div>`;
  }).join('');
  return `<div class="question-item">
    <div class="qi-header">
      <span class="q-num">${q.num}</span>
      <span class="q-topic">${topicLabel}</span>
    </div>
    <div class="qi-text">${q.text}</div>
    <div class="qi-options" id="opts-${q.id}">
      ${q.opts.map((o,i)=>{
        const letter=['A','B','C','D'][i];
        const isAns=i===q.ans;
        return `<div class="qi-option${isAns?' is-answer':''}" style="display:${isAns?'flex':'none'}" data-ans="1">
          <span class="qi-letter">${letter}.</span><span>${o}</span>
        </div>
        <div class="qi-option" style="display:${isAns?'none':'flex'}" data-noans="1">
          <span class="qi-letter">${letter}.</span><span>${o}</span>
        </div>`;
      }).join('')}
    </div>
    <button class="toggle-answer" onclick="toggleAnswer(${q.id}, this)">▶ Hiện đáp án</button>
  </div>`;
}

function toggleAnswer(qid, btn) {
  const container = document.getElementById('opts-' + qid);
  const answers = container.querySelectorAll('[data-ans]');
  const noAnswers = container.querySelectorAll('[data-noans]');
  const showing = answers[0]?.style.display !== 'none';
  answers.forEach(el => el.style.display = showing ? 'none' : 'flex');
  noAnswers.forEach(el => el.style.display = showing ? 'flex' : 'none');
  btn.textContent = showing ? '▶ Hiện đáp án' : '▼ Ẩn đáp án';
  // Show ALL options when revealing
  if (!showing) {
    container.querySelectorAll('.qi-option').forEach(el => el.style.display = 'flex');
    btn.textContent = '▼ Ẩn đáp án';
  } else {
    // Hide non-answer options
    container.querySelectorAll('[data-noans]').forEach(el => el.style.display = 'none');
    container.querySelectorAll('[data-ans]').forEach(el => el.style.display = 'flex');
    btn.textContent = '▶ Hiện đáp án';
  }
}

function goPage(p) {
  currentPage = p;
  renderBrowse();
  window.scrollTo({top:0, behavior:'smooth'});
}

// =====================================================
// QUIZ MODE
// =====================================================
function startQuiz() {
  const filtered = getFiltered();
  quizQuestions = [...filtered].sort(() => Math.random() - 0.5).slice(0, Math.min(30, filtered.length));
  quizIndex = 0;
  quizAnswers = {};
  quizRevealed = {};
  document.getElementById('score-badge').style.display = '';
  renderQuizCard();
}

function renderQuizCard() {
  if (quizIndex >= quizQuestions.length) {
    showResults();
    return;
  }
  const q = quizQuestions[quizIndex];
  const total = quizQuestions.length;
  const pct = (quizIndex / total * 100).toFixed(0);

  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${quizIndex+1} / ${total}`;
  document.getElementById('qz-num').textContent = q.num;
  document.getElementById('qz-topic').textContent = {giun:'Giun tròn',san:'Sán',don_bao:'Đơn bào','don-bao':'Đơn bào','sot-ret':'Sốt rét'}[q.topic]||q.topic;
  document.getElementById('qz-text').textContent = q.text;

  const letters = ['A','B','C','D'];
  const optsEl = document.getElementById('qz-options');
  optsEl.innerHTML = q.opts.map((o,i) => `
    <button class="option${quizRevealed[q.id] ? (i===q.ans?' correct':(i===quizAnswers[q.id]?' wrong':'')) : (i===quizAnswers[q.id]?' selected':'')}"
      onclick="selectOption(${i})" ${quizRevealed[q.id]?'disabled':''}>
      <span class="option-letter">${letters[i]}.</span>
      <span>${o}</span>
    </button>
  `).join('');

  const fb = document.getElementById('qz-feedback');
  if (quizRevealed[q.id]) {
    const correct = quizAnswers[q.id] === q.ans;
    fb.className = 'feedback ' + (correct ? 'correct-fb' : 'wrong-fb');
    fb.style.display = 'block';
    fb.textContent = correct ? '✅ Chính xác!' : `❌ Sai rồi. Đáp án đúng là: ${letters[q.ans]}. ${q.opts[q.ans]}`;
  } else {
    fb.style.display = 'none';
  }

  document.getElementById('btn-next').textContent = quizIndex < quizQuestions.length - 1 ? 'Tiếp →' : 'Xem kết quả';
  updateScore();
}

function selectOption(idx) {
  const q = quizQuestions[quizIndex];
  if (quizRevealed[q.id]) return;
  quizAnswers[q.id] = idx;
  quizRevealed[q.id] = true;
  renderQuizCard();
}

function quizNext() {
  const q = quizQuestions[quizIndex];
  if (!quizRevealed[q.id]) {
    quizRevealed[q.id] = true;
    renderQuizCard();
    return;
  }
  quizIndex++;
  renderQuizCard();
}

function quizPrev() {
  if (quizIndex > 0) { quizIndex--; renderQuizCard(); }
}

function quizSkip() {
  quizIndex++;
  if (quizIndex >= quizQuestions.length) showResults();
  else renderQuizCard();
}

function updateScore() {
  const answered = Object.keys(quizAnswers).length;
  const correct = quizQuestions.filter(q => quizAnswers[q.id] === q.ans).length;
  document.getElementById('score-text').textContent = correct + '/' + answered;
}

// =====================================================
// RESULTS
// =====================================================
function showResults() {
  setMode('result');
  const total = quizQuestions.length;
  const answered = Object.keys(quizAnswers).length;
  const correct = quizQuestions.filter(q => quizAnswers[q.id] === q.ans).length;
  const pct = answered > 0 ? Math.round(correct / answered * 100) : 0;

  document.getElementById('final-score').textContent = pct + '%';
  document.getElementById('result-detail').innerHTML = `
    <p style="color:var(--muted); font-size:0.9rem">${correct} / ${answered} câu đúng (bỏ qua: ${total - answered} câu)</p>
  `;

  const reviewEl = document.getElementById('review-list');
  reviewEl.innerHTML = '<h3 style="color:var(--muted);font-size:0.85rem;margin-bottom:0.8rem;">📋 Chi tiết từng câu</h3>' +
    quizQuestions.map(q => {
      const userAns = quizAnswers[q.id];
      const correct2 = userAns === q.ans;
      const letters = ['A','B','C','D'];
      const skipped = userAns === undefined;
      return `<div class="question-item" style="border-color:${skipped?'var(--border)':correct2?'rgba(34,197,94,0.4)':'rgba(239,68,68,0.4)'}">
        <div class="qi-header">
          <span class="q-num">${q.num}</span>
          <span style="margin-left:auto;font-size:0.8rem">${skipped?'⏭ Bỏ qua':correct2?'✅ Đúng':'❌ Sai'}</span>
        </div>
        <div class="qi-text">${q.text}</div>
        ${!skipped && !correct2 ? `<div style="font-size:0.82rem;color:#f87171;margin-top:0.3rem">Bạn chọn: ${letters[userAns]}. ${q.opts[userAns]}</div>` : ''}
        <div style="font-size:0.82rem;color:#4ade80;margin-top:0.3rem">✔ Đáp án: ${letters[q.ans]}. ${q.opts[q.ans]}</div>
      </div>`;
    }).join('');
}

function restartQuiz() {
  setMode('quiz');
  startQuiz();
}

// =====================================================
// MODE SWITCHING
// =====================================================
function setMode(mode) {
  currentMode = mode;
  document.getElementById('browse-mode').style.display = mode === 'browse' ? '' : 'none';
  document.getElementById('quiz-mode').style.display = mode === 'quiz' ? '' : 'none';
  document.getElementById('result-mode').style.display = mode === 'result' ? '' : 'none';
  document.getElementById('filter-bar').style.display = mode === 'browse' ? '' : 'none';

  document.getElementById('btn-browse').classList.toggle('active', mode === 'browse');
  document.getElementById('btn-quiz').classList.toggle('active', mode === 'quiz');
  document.getElementById('btn-result').style.display = mode === 'result' ? '' : 'none';
  document.getElementById('btn-result').classList.toggle('active', mode === 'result');

  if (mode === 'quiz') startQuiz();
  if (mode === 'browse') renderBrowse();
}

// =====================================================
// INIT
// =====================================================
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('total-count').textContent = questions.length;
  renderBrowse();
});
</script>
